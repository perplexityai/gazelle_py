name: ci

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Emits the platform matrix once. macOS is dropped on pull_request runs
  # (saves runner minutes) but stays for push to main and the merge queue.
  matrix:
    name: matrix
    runs-on: ubuntu-latest
    outputs:
      platforms: ${{ steps.set.outputs.platforms }}
    steps:
      - id: set
        env:
          EVENT: ${{ github.event_name }}
        run: |
          if [ "$EVENT" = "pull_request" ]; then
            echo 'platforms=[{"platform":"linux-x86_64","runner":"ubuntu-latest"}]' >> "$GITHUB_OUTPUT"
          else
            echo 'platforms=[{"platform":"linux-x86_64","runner":"ubuntu-latest"},{"platform":"macos-arm64","runner":"macos-latest"}]' >> "$GITHUB_OUTPUT"
          fi

  bazel-test:
    needs: matrix
    name: bazel ${{ matrix.bazel }} test (${{ matrix.os.platform }})
    runs-on: ${{ matrix.os.runner }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.matrix.outputs.platforms) }}
        # rules_rs's bazel_compatibility floor is 8.5.0; we test the latest
        # 8.x and the 9.x our .bazelversion pins. Bare values to keep
        # bazelisk's USE_BAZEL_VERSION resolution stable across matrix axes.
        bazel: ["9.0.0", "8.6.0"]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ matrix.os.platform }}-bazel${{ matrix.bazel }}
          repository-cache: true

      - name: bazel test //...
        env:
          USE_BAZEL_VERSION: ${{ matrix.bazel }}
        run: bazelisk test //...

  # Examples are linux-only — they exercise the BUILD-generation path and
  # don't add platform-specific coverage worth the macOS runner cost.
  # Fanned out into a matrix (one runner per example × bazel version) so
  # the slowest example doesn't gate the others.
  examples:
    name: examples/${{ matrix.example }} / bazel ${{ matrix.bazel }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bazel: ["9.0.0", "8.6.0"]
        example: [basic, composite, edge_cases, file_mode, project_mode, naming_conventions]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          # Per-example disk cache so concurrent shards don't fight for the
          # same key. setup-bazel uses the cache key to coordinate save/restore;
          # sharing across examples produced spurious "another job is creating
          # this cache" warnings under the prior single-job layout.
          disk-cache: ${{ github.workflow }}-examples-${{ matrix.example }}-bazel${{ matrix.bazel }}
          repository-cache: true

      - name: bazel test + gazelle diff
        env:
          USE_BAZEL_VERSION: ${{ matrix.bazel }}
        run: |
          set -euo pipefail
          cd "examples/${{ matrix.example }}"
          bazelisk test //...
          bazelisk run //:gazelle -- update -mode=diff

  # cross_compile is special: it has no Python source and no gazelle diff
  # to check — its job is to analyze a darwin-targeted gazelle_binary on a
  # Linux runner so the @macos_sdk visibility regression in gazelle_py's
  # MODULE.bazel is caught before it ships. We use --nobuild because the
  # Linux runner has no Apple cc toolchain registered; the regression
  # manifests at analysis time, before linking is ever attempted.
  examples-cross-compile:
    name: examples/cross_compile / bazel ${{ matrix.bazel }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bazel: ["9.0.0", "8.6.0"]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-examples-cross_compile-bazel${{ matrix.bazel }}
          repository-cache: true

      - name: analyze darwin targets from linux
        env:
          USE_BAZEL_VERSION: ${{ matrix.bazel }}
        run: |
          set -euo pipefail
          cd examples/cross_compile
          for triple in aarch64-apple-darwin x86_64-apple-darwin; do
            echo "::group::--platforms=$triple"
            bazelisk build --nobuild "--platforms=@rules_rs//rs/platforms:$triple" //:gazelle_bin
            echo "::endgroup::"
          done
